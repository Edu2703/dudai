<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoria de Conversas — DudAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #e91e8c;
    --pink-light: #ff6ec7;
    --pink-dim: rgba(233,30,140,0.12);
    --dark: #0e0e14;
    --card: #16161f;
    --border: rgba(255,255,255,0.07);
    --text: #f0eaf5;
    --muted: #8a7f96;
    --green: #2ecc71;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 0 0 60px; }
  header { background: linear-gradient(135deg, #1a0a14 0%, #0e0e14 60%); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  .logo { width: 38px; height: 38px; background: var(--pink); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  header h1 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  header span { font-size: 13px; color: var(--muted); margin-left: 4px; }
  .back-btn { margin-left: auto; background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; text-decoration: none; transition: all 0.2s; }
  .back-btn:hover { color: var(--text); border-color: var(--pink); }
  main { max-width: 860px; margin: 0 auto; padding: 40px 24px 0; }
  .page-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 6px; }
  .page-title span { color: var(--pink); }
  .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .search-box { display: flex; gap: 12px; margin-bottom: 36px; }
  .search-box input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .search-box input::placeholder { color: var(--muted); }
  .search-box input:focus { border-color: var(--pink); }
  .btn-buscar { background: var(--pink); color: #fff; border: none; border-radius: var(--radius); padding: 14px 28px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .btn-buscar:hover { background: var(--pink-light); transform: translateY(-1px); }
  .btn-buscar:disabled { opacity: 0.5; cursor: default; transform: none; }
  .estado { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .estado .icon { font-size: 40px; margin-bottom: 12px; display: block; }
  .session-info { background: var(--pink-dim); border: 1px solid rgba(233,30,140,0.25); border-radius: var(--radius); padding: 14px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .session-info strong { color: var(--pink); font-family: 'Syne', sans-serif; }
  .count-badge { margin-left: auto; background: var(--pink); color: #fff; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; }
  .chat-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
  .chat-scroll { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg-bubble { display: flex; flex-direction: column; max-width: 80%; animation: fadeIn 0.3s ease both; }
  .msg-bubble.cliente { align-self: flex-start; }
  .msg-bubble.duda { align-self: flex-end; }
  .bubble-tag { font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 4px; padding: 0 4px; }
  .cliente .bubble-tag { color: var(--muted); }
  .duda .bubble-tag { color: var(--pink-light); text-align: right; }
  .bubble-text { padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.6; }
  .cliente .bubble-text { background: rgba(255,255,255,0.07); border-radius: 4px 14px 14px 14px; }
  .duda .bubble-text { background: rgba(233,30,140,0.18); border-radius: 14px 4px 14px 14px; }
  .bubble-footer { display: flex; align-items: center; gap: 8px; margin-top: 5px; padding: 0 4px; }
  .duda .bubble-footer { justify-content: flex-end; }
  .bubble-time { font-size: 11px; color: var(--muted); }
  .btn-corrigir { background: transparent; border: 1px solid var(--pink); color: var(--pink); border-radius: 6px; padding: 3px 10px; font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-corrigir:hover { background: var(--pink); color: #fff; }
  .correcao-badge { font-size: 11px; background: rgba(46,204,113,0.15); color: var(--green); border-radius: 6px; padding: 3px 10px; font-family: 'Syne', sans-serif; font-weight: 600; }
  .correcao-texto { margin-top: 6px; padding: 8px 12px; background: rgba(46,204,113,0.08); border-left: 2px solid var(--green); border-radius: 0 8px 8px 0; font-size: 13px; color: #7ee8a2; line-height: 1.5; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border: 1px solid rgba(233,30,140,0.3); border-radius: 18px; width: 100%; max-width: 560px; padding: 28px; animation: modalIn 0.25s ease both; }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; transition: color 0.2s; }
  .modal-close:hover { color: var(--text); }
  .modal-context { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 14px; margin-bottom: 16px; font-size: 13px; line-height: 1.6; color: var(--muted); }
  .modal-context strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 11px; font-family: 'Syne', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; }
  .modal label { display: block; font-size: 13px; font-family: 'Syne', sans-serif; font-weight: 600; margin-bottom: 8px; color: var(--pink-light); }
  .modal textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.6; resize: vertical; min-height: 110px; outline: none; transition: border-color 0.2s; margin-bottom: 18px; }
  .modal textarea:focus { border-color: var(--pink); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 10px; padding: 10px 20px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
  .btn-cancel:hover { border-color: var(--text); color: var(--text); }
  .btn-salvar { background: var(--pink); border: none; color: #fff; border-radius: 10px; padding: 10px 24px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-salvar:hover { background: var(--pink-light); }
  .btn-salvar:disabled { opacity: 0.5; cursor: default; }
  .toast { position: fixed; bottom: 30px; right: 30px; background: var(--green); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all 0.3s; z-index: 200; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: #e74c3c; }
</style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div><h1>DudAI <span>— Painel</span></h1></div>
  <a href="index.html" class="back-btn">← Voltar ao Painel</a>
</header>

<main>
  <h2 class="page-title">Auditoria de <span>Conversas</span></h2>
  <p class="page-sub">Busque pelo ID da sessão para revisar e corrigir respostas da DudAI</p>

  <div class="search-box">
    <input type="text" id="inputSessionId" placeholder="Cole o Session ID da conversa aqui..." />
    <button class="btn-buscar" id="btnBuscar" onclick="buscarConversa()">Buscar</button>
  </div>

  <div id="resultado">
    <div class="estado">
      <span class="icon">🔍</span>
      Digite um Session ID acima para carregar a conversa.
    </div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✏️ Corrigir Resposta da IA</span>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-context">
      <strong>Resposta Original da DudAI</strong>
      <span id="modalResposta">—</span>
    </div>
    <label for="modalTexto">Como deveria ter respondido?</label>
    <textarea id="modalTexto" placeholder="Digite a resposta correta aqui..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-salvar" id="btnSalvar" onclick="salvarCorrecao()">Salvar Correção</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://knpnnmytfmxjdymmziza.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtucG5ubXl0Zm14amR5bW16aXphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MzE2MTAsImV4cCI6MjA4NzUwNzYxMH0.vLx9C8y3lWRpabnCz_iAfdltYLylErtTvluF0nSDbBc';

  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json'
  };

  let registroAtual = null;

  document.getElementById('inputSessionId').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscarConversa();
  });

  async function buscarConversa() {
    const sessionId = document.getElementById('inputSessionId').value.trim();
    if (!sessionId) return mostrarEstado('⚠️', 'Digite um Session ID para buscar.');

    const btn = document.getElementById('btnBuscar');
    btn.disabled = true;
    btn.textContent = 'Buscando...';
    mostrarEstado('⏳', 'Carregando conversa...');

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/chat_mensagens?session_id=eq.${encodeURIComponent(sessionId)}&order=created_at.asc`,
        { headers }
      );
      const dados = await res.json();

      if (!Array.isArray(dados) || dados.length === 0) {
        mostrarEstado('😶', 'Nenhuma conversa encontrada com esse Session ID.');
      } else {
        renderizarResultados(sessionId, dados);
      }
    } catch (err) {
      mostrarEstado('❌', 'Erro ao buscar. Verifique a conexão.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Buscar';
    }
  }

  function renderizarResultados(sessionId, dados) {
    const div = document.getElementById('resultado');

    let html = `
      <div class="session-info">
        🗂️ Session ID: <strong>${sessionId}</strong>
        <span class="count-badge">${dados.length} mensagens</span>
      </div>
      <div class="chat-wrapper"><div class="chat-scroll">
    `;

    dados.forEach((item, i) => {
      const isCliente = item.autor !== 'dudaAI';
      const classe = isCliente ? 'cliente' : 'duda';
      const label = isCliente ? '👤 Cliente' : '🤖 DudAI';
      const hora = item.created_at
        ? new Date(item.created_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
        : '';

      const correcaoHtml = item.correcao_humana
        ? `<div class="correcao-texto">✏️ ${escHtml(item.correcao_humana)}</div>` : '';

      const btnCorrigir = !isCliente
        ? `<button class="btn-corrigir" onclick='abrirModal(${JSON.stringify(item)})'>✏️ Corrigir</button>` : '';

      const correcaoBadge = item.correcao_humana
        ? `<span class="correcao-badge">✓ Corrigido</span>` : '';

      html += `
        <div class="msg-bubble ${classe}" style="animation-delay:${i * 0.03}s">
          <span class="bubble-tag">${label}</span>
          <div class="bubble-text">${escHtml(item.mensagem || '—')}</div>
          ${correcaoHtml}
          <div class="bubble-footer">
            <span class="bubble-time">${hora}</span>
            ${correcaoBadge}
            ${btnCorrigir}
          </div>
        </div>
      `;
    });

    html += `</div></div>`;
    div.innerHTML = html;
  }

  function abrirModal(item) {
    registroAtual = item;
    document.getElementById('modalResposta').textContent = item.mensagem || '—';
    document.getElementById('modalTexto').value = item.correcao_humana || '';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('modalTexto').focus(), 100);
  }

  function fecharModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    registroAtual = null;
  }

  async function salvarCorrecao() {
    const texto = document.getElementById('modalTexto').value.trim();
    if (!texto) return mostrarToast('Digite a correção antes de salvar.', true);

    const btn = document.getElementById('btnSalvar');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/chat_mensagens?id=eq.${registroAtual.id}`,
        {
          method: 'PATCH',
          headers,
          body: JSON.stringify({ correcao_humana: texto })
        }
      );

      if (res.ok) {
        mostrarToast('✅ Correção salva com sucesso!');
        fecharModal();
        buscarConversa();
      } else {
        mostrarToast('Erro ao salvar. Tente novamente.', true);
      }
    } catch {
      mostrarToast('Erro de conexão.', true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Salvar Correção';
    }
  }

  function mostrarEstado(icon, msg) {
    document.getElementById('resultado').innerHTML = `<div class="estado"><span class="icon">${icon}</span>${msg}</div>`;
  }

  function mostrarToast(msg, erro = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (erro ? ' error' : '') + ' show';
    setTimeout(() => t.className = 'toast', 3000);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/\n/g, '<br>');
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) fecharModal();
  });
</script>
</body>
</html>
