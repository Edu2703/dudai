<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Surpresinhas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --pink:#e91e8c; --dark:#1a1a2e; --dark2:#16213e; --text:#f0f0f0; --muted:#888; --border:rgba(255,255,255,0.08); }
body { font-family:'DM Sans',sans-serif; background:var(--dark); color:var(--text); height:100vh; overflow:hidden; }
#login-screen { display:flex; align-items:center; justify-content:center; height:100vh; background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 50%,#1a1a2e 100%); }
.login-box { background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:20px; padding:40px; width:360px; }
.login-logo { text-align:center; margin-bottom:32px; }
.login-logo .icon { font-size:48px; display:block; margin-bottom:8px; }
.login-logo h1 { font-size:22px; font-weight:600; color:#fff; }
.login-logo p { font-size:13px; color:var(--muted); margin-top:4px; }
.login-field { margin-bottom:16px; }
.login-field label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
.login-field input { width:100%; padding:12px 16px; background:rgba(255,255,255,0.07); border:1px solid var(--border); border-radius:10px; color:#fff; font-size:14px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.2s; }
.login-field input:focus { border-color:var(--pink); }
.login-error { color:#ff6b6b; font-size:12px; margin-top:8px; display:none; }
.btn-login { width:100%; padding:13px; background:var(--pink); border:none; border-radius:10px; color:#fff; font-size:14px; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; margin-top:8px; }
.btn-login:hover { background:#c41677; }
#app { display:none; height:100vh; flex-direction:column; }
#app.visible { display:flex; }
#topbar { height:54px; background:var(--dark2); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:12px; flex-shrink:0; }
.logo { font-size:16px; font-weight:600; color:#fff; display:flex; align-items:center; gap:8px; }
.logo span { color:var(--pink); }
.spacer { flex:1; }
#sup-name { font-size:13px; color:var(--muted); }
#btn-logout { background:none; border:1px solid var(--border); color:var(--muted); font-size:12px; padding:5px 12px; border-radius:6px; cursor:pointer; font-family:'DM Sans',sans-serif; }
#btn-logout:hover { border-color:#ff6b6b; color:#ff6b6b; }
#main { display:flex; flex:1; overflow:hidden; }
#sidebar { width:280px; background:var(--dark2); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
#sidebar-header { padding:16px 16px 12px; border-bottom:1px solid var(--border); }
#sidebar-header h2 { font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
#conv-count { font-size:11px; color:var(--pink); margin-top:2px; }
#conv-list { flex:1; overflow-y:auto; }
.conv-item { padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; position:relative; }
.conv-item:hover { background:rgba(255,255,255,0.04); }
.conv-item.active { background:rgba(233,30,140,0.1); border-right:3px solid var(--pink); }
.conv-item.human { border-left:3px solid #4ade80; }
.conv-session { font-size:11px; color:var(--muted); font-family:monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
.conv-last { font-size:12px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:0.7; }
.conv-time { font-size:10px; color:var(--muted); position:absolute; top:12px; right:12px; }
.conv-badge { display:inline-block; background:#4ade80; color:#000; font-size:9px; font-weight:600; padding:1px 5px; border-radius:4px; margin-left:6px; }
.empty-state { padding:32px 16px; text-align:center; color:var(--muted); font-size:13px; }
#chat-area { flex:1; display:flex; flex-direction:column; background:var(--dark); }
#chat-placeholder { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; color:var(--muted); }
#chat-placeholder .icon { font-size:48px; opacity:0.3; }
#chat-panel { display:none; flex-direction:column; height:100%; }
#chat-panel.visible { display:flex; }
#chat-topbar { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; background:var(--dark2); flex-shrink:0; }
#chat-session-label { font-size:11px; color:var(--muted); font-family:monospace; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#btn-assumir,#btn-devolver { padding:6px 14px; border-radius:7px; font-size:12px; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; border:none; }
#btn-assumir { background:var(--pink); color:#fff; }
#btn-devolver { background:rgba(74,222,128,0.15); color:#4ade80; border:1px solid rgba(74,222,128,0.3); display:none; }
#btn-auditoria { padding:6px 14px; border-radius:7px; font-size:12px; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; background:rgba(255,255,255,0.07); border:1px solid var(--border); color:var(--muted); text-decoration:none; display:flex; align-items:center; gap:5px; transition:all 0.2s; }
#btn-auditoria:hover { border-color:var(--pink); color:var(--pink); }
#human-banner { background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.2); color:#4ade80; font-size:12px; padding:8px 16px; text-align:center; display:none; flex-shrink:0; }
#chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px; }
.msg { max-width:75%; padding:10px 14px; border-radius:14px; font-size:13px; line-height:1.5; word-break:break-word; }
.msg.cliente { background:rgba(255,255,255,0.08); align-self:flex-start; border-bottom-left-radius:4px; }
.msg.dudai { background:rgba(233,30,140,0.15); align-self:flex-start; border-bottom-left-radius:4px; border-left:3px solid var(--pink); }
.msg.supervisor { background:var(--pink); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
.msg-label { font-size:10px; font-weight:600; margin-bottom:3px; opacity:0.6; text-transform:uppercase; }
.msg-time { font-size:10px; opacity:0.5; margin-top:4px; }
#input-area { padding:12px 16px; border-top:1px solid var(--border); display:flex; gap:10px; align-items:flex-end; background:var(--dark2); flex-shrink:0; }
#input-area.off { opacity:0.4; pointer-events:none; }
#sup-input { flex:1; background:rgba(255,255,255,0.07); border:1px solid var(--border); border-radius:12px; padding:10px 14px; color:#fff; font-size:13px; font-family:'DM Sans',sans-serif; outline:none; resize:none; min-height:40px; max-height:100px; }
#sup-input:focus { border-color:var(--pink); }
#sup-send { width:38px; height:38px; background:var(--pink); border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
#sup-send svg { width:16px; height:16px; fill:#fff; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">🎁</span>
      <h1>Surpresinhas</h1>
      <p>Painel de Supervisão</p>
    </div>
    <div class="login-field"><label>Usuário</label><input type="text" id="inp-user" placeholder="seu usuário"/></div>
    <div class="login-field"><label>Senha</label><input type="password" id="inp-pass" placeholder="••••••••"/></div>
    <div class="login-error" id="login-error">Usuário ou senha incorretos.</div>
    <button class="btn-login" id="btn-login">Entrar</button>
  </div>
</div>

<div id="app">
  <div id="topbar">
    <div class="logo">🎁 <span>Surpresinhas</span> · Painel</div>
    <div class="spacer"></div>
    <span id="sup-name"></span>
    <button id="btn-logout">Sair</button>
  </div>
  <div id="main">
    <div id="sidebar">
      <div id="sidebar-header"><h2>Conversas</h2><div id="conv-count">carregando...</div></div>
      <div id="conv-list"><div class="empty-state">Nenhuma conversa ainda</div></div>
    </div>
    <div id="chat-area">
      <div id="chat-placeholder"><div class="icon">💬</div><p>Selecione uma conversa</p></div>
      <div id="chat-panel">
        <div id="chat-topbar">
          <div id="chat-session-label"></div>
          <a id="btn-auditoria" href="#" target="_blank">🔍 Auditoria</a>
          <button id="btn-assumir">Assumir</button>
          <button id="btn-devolver">Devolver à DudAI</button>
        </div>
        <div id="human-banner">✅ Você está no controle desta conversa</div>
        <div id="chat-messages"></div>
        <div id="input-area" class="off">
          <textarea id="sup-input" placeholder="Digite sua resposta..." rows="1"></textarea>
          <button id="sup-send"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function(){
  const _db = window.supabase.createClient(
    'https://knpnnmytfmxjdymmziza.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtucG5ubXl0Zm14amR5bW16aXphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MzE2MTAsImV4cCI6MjA4NzUwNzYxMH0.vLx9C8y3lWRpabnCz_iAfdltYLylErtTvluF0nSDbBc'
  );

  let _session = null, _supervisor = null, _msgCh = null;

  async function hash256(s) {
    const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
    return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
  }

  async function login() {
    const u = document.getElementById('inp-user').value.trim();
    const p = document.getElementById('inp-pass').value;
    const err = document.getElementById('login-error');
    err.style.display = 'none';
    const { data, error } = await _db.from('chat_supervisores').select('*').eq('usuario', u).single();
    if (error || !data) { err.style.display = 'block'; return; }
    const h = await hash256(p);
    if (data.senha_hash !== h) { err.style.display = 'block'; return; }
    _supervisor = data;
    document.getElementById('sup-name').textContent = data.nome;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    startApp();
  }

  async function startApp() {
    await loadList();
    _db.channel('watch_sessoes').on('postgres_changes',{event:'*',schema:'public',table:'chat_sessoes'},()=>loadList()).subscribe();
  }

  async function loadList() {
    const { data } = await _db.from('chat_sessoes').select('*').order('updated_at',{ascending:false});
    const list = document.getElementById('conv-list');
    const cnt = document.getElementById('conv-count');
    if (!data||!data.length) { list.innerHTML='<div class="empty-state">Nenhuma conversa ainda</div>'; cnt.textContent='0 conversas'; return; }
    cnt.textContent=`${data.length} conversa${data.length!==1?'s':''}`;
    list.innerHTML='';
    for (const s of data) {
      const { data: mm } = await _db.from('chat_mensagens').select('mensagem').eq('session_id',s.session_id).order('created_at',{ascending:false}).limit(1);
      const last = mm&&mm.length ? mm[0].mensagem.substring(0,40) : 'Sem mensagens';
      const t = new Date(s.updated_at||s.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      const d = document.createElement('div');
      d.className=`conv-item${s.atendimento_humano?' human':''}${_session===s.session_id?' active':''}`;
      d.innerHTML=`<div class="conv-session">${s.session_id.substring(0,22)}...${s.atendimento_humano?'<span class="conv-badge">HUMANO</span>':''}</div><div class="conv-last">${last}</div><div class="conv-time">${t}</div>`;
      d.addEventListener('click',()=>openConv(s.session_id,s.atendimento_humano));
      list.appendChild(d);
    }
  }

  async function openConv(sid, human) {
    _session = sid;
    document.getElementById('chat-placeholder').style.display='none';
    document.getElementById('chat-panel').classList.add('visible');
    document.getElementById('chat-session-label').textContent=sid;
    // Atualiza link de auditoria com o session_id
    document.getElementById('btn-auditoria').href = `auditoria.html?session_id=${encodeURIComponent(sid)}`;
    setHuman(human);
    const msgs = document.getElementById('chat-messages');
    msgs.innerHTML='';
    const { data } = await _db.from('chat_mensagens').select('*').eq('session_id',sid).order('created_at',{ascending:true});
    if (data) data.forEach(m=>renderMsg(m));
    msgs.scrollTop=msgs.scrollHeight;
    if (_msgCh) _db.removeChannel(_msgCh);
    _msgCh = _db.channel('sup_msgs_'+sid)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'chat_mensagens',filter:`session_id=eq.${sid}`},p=>{renderMsg(p.new);msgs.scrollTop=msgs.scrollHeight;})
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'chat_sessoes',filter:`session_id=eq.${sid}`},p=>setHuman(p.new.atendimento_humano))
      .subscribe();
  }

  function renderMsg(m) {
    const msgs = document.getElementById('chat-messages');
    const d = document.createElement('div');
    const isBot = ['dudaAI','DudaAI','bot','dudai'].includes(m.autor);
    d.className=`msg ${isBot?'dudai':m.autor}`;
    const t = new Date(m.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const label = isBot?'DudAI': m.autor==='supervisor'?'Você':'Cliente';
    d.innerHTML=`<div class="msg-label">${label}</div><div>${m.mensagem}</div><div class="msg-time">${t}</div>`;
    msgs.appendChild(d);
  }

  function setHuman(h) {
    document.getElementById('human-banner').style.display=h?'block':'none';
    const ia = document.getElementById('input-area');
    ia.className=h?'':'off'; ia.style.opacity=h?'1':'0.4'; ia.style.pointerEvents=h?'all':'none';
    document.getElementById('btn-assumir').style.display=h?'none':'block';
    document.getElementById('btn-devolver').style.display=h?'block':'none';
  }

  async function sendMsg() {
    const inp = document.getElementById('sup-input');
    const t = inp.value.trim();
    if (!t||!_session) return;
    inp.value=''; inp.style.height='auto';
    await _db.from('chat_mensagens').insert({session_id:_session,autor:'supervisor',mensagem:t});
  }

  document.getElementById('btn-login').addEventListener('click',login);
  document.getElementById('inp-pass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  document.getElementById('btn-logout').addEventListener('click',()=>location.reload());
  document.getElementById('btn-assumir').addEventListener('click',async()=>{
    if(!_session)return;
    await _db.from('chat_sessoes').update({atendimento_humano:true,supervisor_id:_supervisor.usuario,updated_at:new Date().toISOString()}).eq('session_id',_session);
    setHuman(true); loadList();
  });
  document.getElementById('btn-devolver').addEventListener('click',async()=>{
    if(!_session)return;
    await _db.from('chat_sessoes').update({atendimento_humano:false,supervisor_id:null,updated_at:new Date().toISOString()}).eq('session_id',_session);
    setHuman(false); loadList();
  });
  document.getElementById('sup-send').addEventListener('click',sendMsg);
  document.getElementById('sup-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
  document.getElementById('sup-input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});
})();
</script>
</body>
</html>
