<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Surpresinhas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --pink: #e91e8c;
  --dark: #1a1a2e;
  --dark2: #16213e;
  --dark3: #0f3460;
  --text: #f0f0f0;
  --muted: #888;
  --border: rgba(255,255,255,0.08);
  --card: rgba(255,255,255,0.04);
}
body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); height: 100vh; overflow: hidden; }

/* LOGIN */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh;
  background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 50%, #1a1a2e 100%);
}
.login-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px;
  width: 360px;
  backdrop-filter: blur(20px);
}
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo .icon { font-size: 48px; display: block; margin-bottom: 8px; }
.login-logo h1 { font-size: 22px; font-weight: 600; color: #fff; }
.login-logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }

.login-field { margin-bottom: 16px; }
.login-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.login-field input {
  width: 100%; padding: 12px 16px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: #fff; font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color 0.2s;
}
.login-field input:focus { border-color: var(--pink); }
.login-error { color: #ff6b6b; font-size: 12px; margin-top: 8px; display: none; }

.btn-login {
  width: 100%; padding: 13px;
  background: var(--pink); border: none;
  border-radius: 10px; color: #fff;
  font-size: 14px; font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer; margin-top: 8px;
  transition: background 0.2s, transform 0.1s;
}
.btn-login:hover { background: #c41677; }
.btn-login:active { transform: scale(0.98); }

/* APP */
#app { display: none; height: 100vh; flex-direction: column; }
#app.visible { display: flex; }

/* TOP BAR */
#topbar {
  height: 54px; background: var(--dark2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 12px;
  flex-shrink: 0;
}
#topbar .logo { font-size: 16px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px; }
#topbar .logo span { color: var(--pink); }
#topbar .spacer { flex: 1; }
#topbar .supervisor-name { font-size: 13px; color: var(--muted); }
#btn-logout {
  background: none; border: 1px solid var(--border);
  color: var(--muted); font-size: 12px;
  padding: 5px 12px; border-radius: 6px;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}
#btn-logout:hover { border-color: #ff6b6b; color: #ff6b6b; }

/* MAIN LAYOUT */
#main { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: 280px; background: var(--dark2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
#sidebar-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
}
#sidebar-header h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
#sidebar-header .count { font-size: 11px; color: var(--pink); margin-top: 2px; }

#conv-list { flex: 1; overflow-y: auto; }
#conv-list::-webkit-scrollbar { width: 4px; }
#conv-list::-webkit-scrollbar-thumb { background: var(--border); }

.conv-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.conv-item:hover { background: var(--card); }
.conv-item.active { background: rgba(233,30,140,0.1); border-right: 3px solid var(--pink); }
.conv-item.human { border-left: 3px solid #4ade80; }

.conv-item .conv-session {
  font-size: 11px; color: var(--muted);
  font-family: monospace;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 4px;
}
.conv-item .conv-last {
  font-size: 12px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  opacity: 0.7;
}
.conv-item .conv-time {
  font-size: 10px; color: var(--muted);
  position: absolute; top: 12px; right: 12px;
}
.conv-badge {
  display: inline-block;
  background: #4ade80; color: #000;
  font-size: 9px; font-weight: 600;
  padding: 1px 5px; border-radius: 4px;
  margin-left: 6px; vertical-align: middle;
}
.empty-state {
  padding: 32px 16px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}

/* CHAT AREA */
#chat-area {
  flex: 1; display: flex; flex-direction: column;
  background: var(--dark);
}

#chat-placeholder {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; color: var(--muted);
}
#chat-placeholder .icon { font-size: 48px; opacity: 0.3; }
#chat-placeholder p { font-size: 14px; }

#chat-panel { display: none; flex-direction: column; height: 100%; }
#chat-panel.visible { display: flex; }

#chat-topbar {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  background: var(--dark2); flex-shrink: 0;
}
#chat-session-label {
  font-size: 11px; color: var(--muted);
  font-family: monospace; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#btn-assumir, #btn-devolver {
  padding: 6px 14px; border-radius: 7px;
  font-size: 12px; font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer; border: none;
  transition: all 0.2s;
}
#btn-assumir { background: var(--pink); color: #fff; }
#btn-assumir:hover { background: #c41677; }
#btn-devolver { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); display: none; }
#btn-devolver:hover { background: rgba(74,222,128,0.25); }

#chat-messages {
  flex: 1; overflow-y: auto;
  padding: 20px; display: flex;
  flex-direction: column; gap: 10px;
}
#chat-messages::-webkit-scrollbar { width: 4px; }
#chat-messages::-webkit-scrollbar-thumb { background: var(--border); }

.msg { max-width: 75%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; word-break: break-word; }
.msg.cliente { background: rgba(255,255,255,0.08); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.dudai { background: rgba(233,30,140,0.15); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; border-left: 3px solid var(--pink); }
.msg.supervisor { background: var(--pink); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg-meta { font-size: 10px; opacity: 0.5; margin-top: 4px; }
.msg-label { font-size: 10px; font-weight: 600; margin-bottom: 3px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.3px; }

#chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; align-items: flex-end;
  background: var(--dark2); flex-shrink: 0;
}
#chat-input-area.disabled { opacity: 0.4; pointer-events: none; }
#sup-input {
  flex: 1; background: rgba(255,255,255,0.07);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 14px;
  color: #fff; font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none; resize: none;
  min-height: 40px; max-height: 100px;
  transition: border-color 0.2s;
  line-height: 1.4;
}
#sup-input:focus { border-color: var(--pink); }
#sup-send {
  width: 38px; height: 38px;
  background: var(--pink); border: none;
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.2s;
}
#sup-send:hover { background: #c41677; }
#sup-send svg { width: 16px; height: 16px; fill: #fff; }

#human-mode-banner {
  background: rgba(74,222,128,0.1);
  border: 1px solid rgba(74,222,128,0.2);
  color: #4ade80; font-size: 12px;
  padding: 8px 16px; text-align: center;
  display: none; flex-shrink: 0;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">💝</span>
      <h1>Surpresinhas</h1>
      <p>Painel de Supervisão</p>
    </div>
    <div class="login-field">
      <label>Usuário</label>
      <input type="text" id="input-user" placeholder="seu usuário" autocomplete="username" />
    </div>
    <div class="login-field">
      <label>Senha</label>
      <input type="password" id="input-pass" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="login-error" id="login-error">Usuário ou senha incorretos.</div>
    <button class="btn-login" id="btn-login">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="topbar">
    <div class="logo">💝 <span>Surpresinhas</span> · Painel</div>
    <div class="spacer"></div>
    <div class="supervisor-name" id="sup-name"></div>
    <button id="btn-logout">Sair</button>
  </div>
  <div id="main">
    <div id="sidebar">
      <div id="sidebar-header">
        <h2>Conversas</h2>
        <div class="count" id="conv-count">carregando...</div>
      </div>
      <div id="conv-list"><div class="empty-state">Nenhuma conversa ainda</div></div>
    </div>
    <div id="chat-area">
      <div id="chat-placeholder">
        <div class="icon">💬</div>
        <p>Selecione uma conversa</p>
      </div>
      <div id="chat-panel">
        <div id="chat-topbar">
          <div id="chat-session-label"></div>
          <button id="btn-assumir">Assumir</button>
          <button id="btn-devolver">Devolver à DudAI</button>
        </div>
        <div id="human-mode-banner">✅ Você está no controle desta conversa</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area" class="disabled">
          <textarea id="sup-input" placeholder="Digite sua resposta..." rows="1"></textarea>
          <button id="sup-send">
            <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const { createClient } = window.supabase;
const SUPABASE_URL = 'https://knpnnmytfmxjdymmziza.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtucG5ubXl0Zm14amR5bW16aXphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MzE2MTAsImV4cCI6MjA4NzUwNzYxMH0.vLx9C8y3lWRpabnCz_iAfdltYLylErtTvluF0nSDbBc';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentSession = null;
let currentSupervisor = null;
let msgChannel = null;
let sessChannel = null;

// --- LOGIN ---
async function doLogin() {
  const usuario = document.getElementById('input-user').value.trim();
  const senha = document.getElementById('input-pass').value;
  const erro = document.getElementById('login-error');
  erro.style.display = 'none';

  const { data, error } = await supabase
    .from('chat_supervisores')
    .select('*')
    .eq('usuario', usuario)
    .single();

  if (error || !data) { erro.style.display = 'block'; return; }

  // Verificar senha (md5 via hash simples)
  const senhaHash = await md5(senha);
  if (data.senha_hash !== senhaHash) { erro.style.display = 'block'; return; }

  currentSupervisor = data;
  document.getElementById('sup-name').textContent = data.nome;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  initApp();
}

async function md5(str) {
  const msgBuffer = new TextEncoder().encode(str);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('input-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('btn-logout').addEventListener('click', () => { location.reload(); });

// --- APP ---
async function initApp() {
  await loadConversas();

  // Realtime: novas sessões
  sessChannel = supabase.channel('sessoes_all')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'chat_sessoes' }, () => {
      loadConversas();
    })
    .subscribe();
}

async function loadConversas() {
  const { data } = await supabase
    .from('chat_sessoes')
    .select('*')
    .order('updated_at', { ascending: false });

  const list = document.getElementById('conv-list');
  const count = document.getElementById('conv-count');

  if (!data || data.length === 0) {
    list.innerHTML = '<div class="empty-state">Nenhuma conversa ainda</div>';
    count.textContent = '0 conversas';
    return;
  }

  count.textContent = `${data.length} conversa${data.length !== 1 ? 's' : ''}`;
  list.innerHTML = '';

  for (const s of data) {
    const { data: msgs } = await supabase
      .from('chat_mensagens')
      .select('mensagem, autor')
      .eq('session_id', s.session_id)
      .order('created_at', { ascending: false })
      .limit(1);

    const lastMsg = msgs && msgs.length > 0 ? msgs[0].mensagem : 'Sem mensagens';
    const time = new Date(s.updated_at || s.created_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

    const div = document.createElement('div');
    div.className = `conv-item${s.atendimento_humano ? ' human' : ''}${currentSession === s.session_id ? ' active' : ''}`;
    div.dataset.sessionId = s.session_id;
    div.dataset.humano = s.atendimento_humano;
    div.innerHTML = `
      <div class="conv-session">${s.session_id.substring(0,18)}...${s.atendimento_humano ? '<span class="conv-badge">HUMANO</span>' : ''}</div>
      <div class="conv-last">${lastMsg.substring(0, 40)}${lastMsg.length > 40 ? '...' : ''}</div>
      <div class="conv-time">${time}</div>
    `;
    div.addEventListener('click', () => openConv(s.session_id, s.atendimento_humano));
    list.appendChild(div);
  }
}

async function openConv(sessionId, isHumano) {
  currentSession = sessionId;

  // UI
  document.querySelectorAll('.conv-item').forEach(i => i.classList.remove('active'));
  document.querySelector(`.conv-item[data-session-id="${sessionId}"]`)?.classList.add('active');
  document.getElementById('chat-placeholder').style.display = 'none';
  document.getElementById('chat-panel').classList.add('visible');
  document.getElementById('chat-session-label').textContent = sessionId;

  updateHumanMode(isHumano);

  // Carregar mensagens
  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML = '';
  const { data } = await supabase
    .from('chat_mensagens')
    .select('*')
    .eq('session_id', sessionId)
    .order('created_at', { ascending: true });

  if (data) data.forEach(m => renderMsg(m));
  msgs.scrollTop = msgs.scrollHeight;

  // Realtime mensagens
  if (msgChannel) supabase.removeChannel(msgChannel);
  msgChannel = supabase.channel('msgs_' + sessionId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public',
      table: 'chat_mensagens',
      filter: `session_id=eq.${sessionId}`
    }, payload => {
      renderMsg(payload.new);
      msgs.scrollTop = msgs.scrollHeight;
    })
    .on('postgres_changes', {
      event: 'UPDATE', schema: 'public',
      table: 'chat_sessoes',
      filter: `session_id=eq.${sessionId}`
    }, payload => {
      updateHumanMode(payload.new.atendimento_humano);
    })
    .subscribe();
}

function renderMsg(m) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${m.autor}`;
  const hora = new Date(m.created_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  const labels = { cliente: 'Cliente', dudai: 'DudAI', supervisor: 'Você' };
  div.innerHTML = `<div class="msg-label">${labels[m.autor] || m.autor}</div><div>${m.mensagem}</div><div class="msg-meta">${hora}</div>`;
  msgs.appendChild(div);
}

function updateHumanMode(isHumano) {
  const banner = document.getElementById('human-mode-banner');
  const inputArea = document.getElementById('chat-input-area');
  const btnAssumir = document.getElementById('btn-assumir');
  const btnDevolver = document.getElementById('btn-devolver');

  if (isHumano) {
    banner.style.display = 'block';
    inputArea.classList.remove('disabled');
    btnAssumir.style.display = 'none';
    btnDevolver.style.display = 'block';
  } else {
    banner.style.display = 'none';
    inputArea.classList.add('disabled');
    btnAssumir.style.display = 'block';
    btnDevolver.style.display = 'none';
  }
}

// Assumir conversa
document.getElementById('btn-assumir').addEventListener('click', async () => {
  if (!currentSession) return;
  await supabase.from('chat_sessoes')
    .update({ atendimento_humano: true, supervisor_id: currentSupervisor.usuario, updated_at: new Date().toISOString() })
    .eq('session_id', currentSession);
  updateHumanMode(true);
  loadConversas();
});

// Devolver à DudAI
document.getElementById('btn-devolver').addEventListener('click', async () => {
  if (!currentSession) return;
  await supabase.from('chat_sessoes')
    .update({ atendimento_humano: false, supervisor_id: null, updated_at: new Date().toISOString() })
    .eq('session_id', currentSession);
  updateHumanMode(false);
  loadConversas();
});

// Enviar mensagem como supervisor
async function sendSupMsg() {
  const input = document.getElementById('sup-input');
  const text = input.value.trim();
  if (!text || !currentSession) return;
  input.value = '';
  input.style.height = 'auto';

  await supabase.from('chat_mensagens').insert({
    session_id: currentSession,
    autor: 'supervisor',
    mensagem: text
  });
}

document.getElementById('sup-send').addEventListener('click', sendSupMsg);
document.getElementById('sup-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendSupMsg(); }
});
document.getElementById('sup-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
</script>
</body>
</html>
